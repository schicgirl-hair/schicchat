<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Diagnostic Capillaire Gratuit | Schicgirl</title>
  <meta name="author" content="Schicgirl">
  <meta property="og:title" content="Diagnostic Capillaire Schicgirl">
  <meta property="og:description" content="Découvre ce qui freine vraiment tes cheveux et reçois une routine experte sur mesure.">
  <meta property="og:type" content="website">
  <link rel="icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:     #fdf6ee;
      --warm:      #f5e9d8;
      --rose:      #e4b4af;
      --brown:     #3e261c;
      --brown-md:  #6b3e2e;
      --gold:      #b07b38;
      --gold-lt:   #d4a55e;
      --muted:     #9a7060;
      --white:     #ffffff;
      --shadow-s:  0 4px 24px rgba(62,38,28,.08);
      --shadow-l:  0 24px 80px rgba(62,38,28,.18);
      --radius:    20px;
      --radius-lg: 26px;
      --serif: 'Cormorant Garamond', Georgia, serif;
      --sans:  'DM Sans', system-ui, sans-serif;
    }

    /* ── RESET GLOBAL ─────────────────────────────────── */
    html {
      height: 100%;
      -webkit-text-size-adjust: 100%;
    }

    body {
      height: 100%;
      overflow: hidden;
      font-family: var(--sans);
      color: var(--brown);
      background:
        radial-gradient(ellipse 70% 55% at 8% 0%,   #f2ccc7 0%, transparent 55%),
        radial-gradient(ellipse 60% 50% at 92% 100%, #edd9b0 0%, transparent 50%),
        linear-gradient(160deg, #fdf6ee, #f7ede0);
    }

    /* ── SHELL — conteneur principal ─────────────────── */
    .shell {
      width: min(1000px, 96vw);
      height: 100dvh;   /* dynamic viewport height — évite le bug iOS */
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 8px 0 env(safe-area-inset-bottom, 0px);
      /* padding-bottom absorbe la barre de navigation iOS/Android */
    }

    /* ── INTRO ────────────────────────────────────────── */
    .intro {
      flex: 0 0 auto;
      background: rgba(255,255,255,.72);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(176,123,56,.2);
      border-radius: var(--radius-lg);
      padding: 11px 20px;
      text-align: center;
      box-shadow: var(--shadow-s);
    }

    .eyebrow {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 2px;
    }

    .intro h1 {
      font-family: var(--serif);
      font-size: clamp(20px, 3vw, 34px);
      font-weight: 400;
      line-height: 1.08;
      margin-bottom: 4px;
    }

    .intro-sub {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.45;
      max-width: 640px;
      margin: 0 auto;
    }

    /* ── PANEL — la zone de chat ──────────────────────── */
    /*
     * STRUCTURE FLEX VERTICALE (de haut en bas) :
     *   1. barre de progression   (flex: 0 0 3px)
     *   2. chat-box               (flex: 1 1 auto  — prend tout l'espace restant)
     *   3. quick-replies          (flex: 0 0 auto  — taille naturelle, max 110px)
     *   4. chat-form              (flex: 0 0 auto  — taille fixe)
     *
     * La chat-box a min-height:0 pour ne pas dépasser son conteneur.
     * Les quick-replies ET la chat-form sont TOUJOURS visibles car
     * ils viennent APRÈS la chat-box dans le flux flex.
    */
    .panel {
      flex: 1 1 auto;
      min-height: 0;               /* ← essentiel pour que flex fonctionne */
      display: flex;
      flex-direction: column;
      background: rgba(255,255,255,.82);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(176,123,56,.18);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-l);
      overflow: hidden;
      position: relative;
    }

    /* 1 — barre de progression */
    .progress-track {
      flex: 0 0 3px;
      background: rgba(176,123,56,.1);
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--rose), var(--gold));
      transition: width .5s cubic-bezier(.4,0,.2,1);
    }

    /* bouton reset */
    #resetBtn {
      position: absolute;
      top: 10px; right: 10px;
      width: 30px; height: 30px;
      border-radius: 50%;
      border: 1px solid rgba(176,123,56,.25);
      background: rgba(255,255,255,.88);
      color: var(--muted);
      font-size: 14px;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      transition: all .18s;
      z-index: 20;
    }
    #resetBtn:hover { background: var(--warm); color: var(--brown); }
    #resetBtn.visible { display: flex; }

    /* 2 — zone de messages scrollable */
    .chat-box {
      flex: 1 1 auto;
      min-height: 0;               /* ← empêche le débordement */
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 16px 16px 8px;
      scroll-behavior: smooth;
    }

    .chat-box::-webkit-scrollbar { width: 3px; }
    .chat-box::-webkit-scrollbar-thumb {
      background: rgba(176,123,56,.2);
      border-radius: 3px;
    }

    /* 3 — boutons de réponse rapide */
    .quick-replies {
      flex: 0 0 auto;
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      padding: 8px 14px 6px;
      max-height: 120px;
      overflow-y: auto;
      background: rgba(255,255,255,.6);
      border-top: 1px solid rgba(228,180,175,.2);
    }

    /* quand vide, on ne montre pas la bordure */
    .quick-replies:empty {
      padding: 0;
      border-top: none;
      max-height: 0;
    }

    .quick-btn {
      padding: 8px 14px;
      border-radius: 999px;
      border: 1.5px solid rgba(176,123,56,.32);
      background: rgba(255,255,255,.95);
      color: var(--brown-md);
      font-family: var(--sans);
      font-size: 12.5px;
      font-weight: 500;
      cursor: pointer;
      transition: all .17s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .quick-btn:hover,
    .quick-btn:active {
      background: var(--warm);
      border-color: var(--gold);
      color: var(--brown);
    }

    /* 4 — formulaire de saisie */
    .chat-form {
      flex: 0 0 auto;
      display: flex;
      gap: 8px;
      padding: 10px 12px 12px;
      border-top: 1px solid rgba(228,180,175,.3);
      background: rgba(253,246,238,.95);
    }

    .chat-form input {
      flex: 1;
      height: 44px;
      border-radius: 999px;
      border: 1.5px solid rgba(176,123,56,.28);
      padding: 0 18px;
      font-family: var(--sans);
      font-size: 16px;        /* 16px minimum → évite le zoom auto iOS */
      background: var(--white);
      color: var(--brown);
      outline: none;
      transition: border-color .18s;
    }

    .chat-form input:focus { border-color: var(--gold); }
    .chat-form input::placeholder { color: var(--muted); font-size: 13.5px; }

    .send-btn {
      flex: 0 0 auto;
      height: 44px;
      padding: 0 18px;
      border-radius: 999px;
      border: none;
      background: var(--brown);
      color: var(--white);
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background .18s;
      white-space: nowrap;
    }

    .send-btn:hover { background: var(--brown-md); }

    /* ── MESSAGES ─────────────────────────────────────── */
    .msg {
      max-width: 86%;
      margin-bottom: 10px;
      border-radius: 18px;
      padding: 11px 15px;
      font-size: 13.5px;
      line-height: 1.58;
      white-space: pre-line;
      animation: fadeUp .28s cubic-bezier(.34,1.2,.64,1) both;
    }

    @keyframes fadeUp {
      from { opacity:0; transform: translateY(8px) scale(.97); }
      to   { opacity:1; transform: none; }
    }

    .msg.bot {
      background: var(--white);
      border: 1px solid rgba(228,180,175,.4);
      border-bottom-left-radius: 5px;
    }

    .msg.user {
      background: var(--brown);
      color: var(--white);
      margin-left: auto;
      border-bottom-right-radius: 5px;
    }

    .msg.result {
      background: linear-gradient(145deg,#fffaf3,#fff8ee);
      border: 1px solid rgba(176,123,56,.3);
      max-width: 100%;
      font-size: 13px;
    }

    .msg.html-msg {
      background: transparent;
      border: none;
      padding: 0;
      max-width: 100%;
    }

    /* ── INDICATEUR DE FRAPPE ─────────────────────────── */
    .typing {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 11px 15px;
      background: var(--white);
      border: 1px solid rgba(228,180,175,.4);
      border-radius: 18px;
      border-bottom-left-radius: 5px;
      margin-bottom: 10px;
      animation: fadeUp .22s both;
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--rose);
      animation: bounce 1.2s ease-in-out infinite;
    }

    .dot:nth-child(2) { animation-delay: .18s; }
    .dot:nth-child(3) { animation-delay: .36s; }

    @keyframes bounce {
      0%,60%,100% { transform: translateY(0); opacity:.6; }
      30%          { transform: translateY(-6px); opacity:1; }
    }

    /* ── ÉLÉMENTS DU DIAGNOSTIC ───────────────────────── */
    .r-section   { margin-bottom: 14px; }
    .r-label     {
      font-size: 9.5px; font-weight: 700;
      letter-spacing: .2em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 5px;
    }
    .r-section p,
    .r-section ul { font-size: 13px; line-height: 1.65; color: var(--brown); }

    .score-badge {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: rgba(176,123,56,.09);
      border-radius: 14px;
      padding: 10px 16px;
      margin-bottom: 10px;
    }

    .score-num {
      font-family: var(--serif);
      font-size: 42px; font-weight: 600;
      color: var(--gold); line-height: 1;
    }

    .score-meta { font-size: 12px; color: var(--muted); line-height: 1.45; }

    .divider { height: 1px; background: rgba(176,123,56,.14); margin: 12px 0; }

    .recipe-card {
      background: rgba(253,246,238,.7);
      border: 1px solid rgba(176,123,56,.22);
      border-radius: 14px;
      padding: 13px 15px;
      margin-bottom: 10px;
      font-size: 13px;
      line-height: 1.65;
    }

    .recipe-card strong { color: var(--gold); display: block; margin-bottom: 5px; font-size: 14px; }
    .recipe-sub { font-weight: 600; font-size: 11.5px; color: var(--gold); margin: 7px 0 2px; display: block; }

    /* ── CARTE OFFRE ──────────────────────────────────── */
    .offer-wrap {
      background: linear-gradient(145deg,#fffaf3,#fff5ea);
      border: 1px solid rgba(176,123,56,.35);
      border-radius: var(--radius);
      padding: 20px;
    }

    .offer-wrap h3 {
      font-family: var(--serif);
      font-size: 22px; font-weight: 400;
      margin-bottom: 10px;
    }

    .offer-wrap p {
      font-size: 13px; color: var(--muted);
      line-height: 1.65; margin-bottom: 9px;
    }

    .offer-btns { display: grid; gap: 10px; margin: 14px 0; }

    .offer-btn {
      display: block; text-align: center;
      text-decoration: none;
      padding: 13px 18px; border-radius: 999px;
      font-family: var(--sans);
      font-size: 13.5px; font-weight: 700;
      transition: all .2s;
    }

    .offer-btn.primary { background: var(--brown); color: var(--white); }
    .offer-btn.primary:hover { background: var(--brown-md); }
    .offer-btn.gold   { background: linear-gradient(135deg,var(--gold),var(--gold-lt)); color: var(--white); }
    .offer-btn.gold:hover { filter: brightness(1.06); }

    /* ── ÉCRAN DÉJÀ UTILISÉ ───────────────────────────── */
    .used-screen { padding: 36px 24px; text-align: center; }
    .used-screen h2 { font-family: var(--serif); font-size: 28px; font-weight: 400; margin-bottom: 12px; }
    .used-screen p  { font-size: 14px; color: var(--muted); line-height: 1.7; margin-bottom: 8px; }
    .used-screen a  { color: var(--gold); font-weight: 600; text-decoration: none; }

    /* ── RESPONSIVE ───────────────────────────────────── */
    @media (max-width: 600px) {
      .shell  { width: 100%; padding: 5px 0 env(safe-area-inset-bottom,0px); gap: 6px; }
      .intro  { padding: 9px 12px; border-radius: 14px; }
      .intro h1 { font-size: clamp(18px, 6vw, 26px); }
      .intro-sub { display: none; }
      .panel  { border-radius: 14px; }
      .chat-box { padding: 12px 11px 6px; }
      .msg    { font-size: 13px; max-width: 95%; }
      .chat-form { padding: 8px 10px 10px; gap: 7px; }
      .send-btn  { padding: 0 14px; font-size: 12.5px; }
    }

    @media (max-height: 680px) {
      .intro-sub { display: none; }
      .intro h1  { font-size: clamp(18px, 2.6vw, 24px); }
      .intro     { padding: 7px 14px; }
      .msg       { font-size: 13px; padding: 9px 13px; }
    }
  </style>
</head>
<body>

<div class="shell">

  <!-- ── EN-TÊTE ──────────────────────────────────────── -->
  <header class="intro">
    <p class="eyebrow">Schicgirl™ — Diagnostic Capillaire Expert</p>
    <h1>Découvre ce qui freine vraiment tes cheveux</h1>
    <p class="intro-sub">Un diagnostic professionnel complet — porosité, structure, cuir chevelu, habitudes, alimentation. Tu reçois une routine sur mesure, des recettes naturelles détaillées et un plan d'action immédiat.</p>
  </header>

  <!-- ── PANNEAU CHAT ──────────────────────────────────── -->
  <main class="panel">

    <!-- 1 · Progression -->
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <!-- Bouton reset -->
    <button id="resetBtn" title="Recommencer" aria-label="Recommencer">↻</button>

    <!-- 2 · Messages -->
    <div class="chat-box" id="chatBox"></div>

    <!-- 3 · Réponses rapides  ← au-dessus du formulaire dans le DOM -->
    <div class="quick-replies" id="quickReplies"></div>

    <!-- 4 · Formulaire de saisie -->
    <form class="chat-form" id="chatForm" autocomplete="off">
      <input id="userInput" placeholder="Écris ta réponse ici…" />
      <button type="submit" class="send-btn">Envoyer</button>
    </form>

  </main>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════════
   CONFIG
═══════════════════════════════════════════════════════════════════ */
const CONFIG = {
  shopLink:          "https://selar.com/hydratation-cheveux-crepus",
  premiumLink:       "https://selar.com/70t3ur414k",
  webAppUrl:         "https://script.google.com/macros/s/AKfycbz3a2umYva-S2SH20gMDa2YuRPAt5suYBfS7qdrDgQBqXmv1EJ5dLfkhfC1Y3T622rI3g/exec",
  clientToken:       "schicchat_client_2026-12544455",
  leadStorageKey:    "schicchat_leads",
  settingsStorageKey:"schicchat_settings",
  enableOneUse:      true,
  usedStorageKey:    "schicchat_used_once"
};

/* ═══════════════════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════════════════ */
const state = {
  step:"", name:"", contact:"", country:"", climate:"",
  mainProblem:"", texture:"", subTexture:"", thickness:"", density:"",
  elasticity:"", hairLength:"",
  lastHydration:"", washFrequency:"", washMethod:"", waterHardness:"",
  routine:"", lco:"", proteinBalance:"",
  breakage:"", splitEnds:"", porosity:"", heatDamage:"",
  scalp:"", dandruff:"", scalpOiliness:"",
  styles:"", detangling:"", accessories:"",
  products:"", buildup:"", heat:"", heatProtectant:"",
  water:"", foodProtein:"", hormonal:"", stressSleep:"", supplements:"",
  goal:"", timeAvailable:"", budget:"",
  score:0, profile:"", priority:"", offer:"", redFlags:[]
};

const STEPS = [
  "ask_name","ask_contact","ask_country","ask_climate",
  "ask_problem","ask_texture","ask_subTexture","ask_thickness","ask_density","ask_elasticity","ask_hairLength",
  "ask_hydration","ask_wash","ask_washMethod","ask_waterHardness",
  "ask_routine","ask_lco","ask_proteinBalance",
  "ask_breakage","ask_splitEnds","ask_porosity","ask_heatDamage",
  "ask_scalp","ask_dandruff","ask_scalpOiliness",
  "ask_styles","ask_detangling","ask_accessories",
  "ask_products","ask_buildup","ask_heat","ask_heatProtectant",
  "ask_water","ask_foodProtein","ask_hormonal","ask_stressSleep","ask_supplements",
  "ask_goal","ask_time","ask_budget",
  "done"
];

/* ═══════════════════════════════════════════════════════════════════
   DOM
═══════════════════════════════════════════════════════════════════ */
const chatBox   = document.getElementById("chatBox");
const quickR    = document.getElementById("quickReplies");
const chatForm  = document.getElementById("chatForm");
const userInput = document.getElementById("userInput");
const resetBtn  = document.getElementById("resetBtn");
const progFill  = document.getElementById("progressFill");

/* ═══════════════════════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════════════════════ */
const norm = t => String(t||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").trim();

function getSettings(){
  const s = localStorage.getItem(CONFIG.settingsStorageKey);
  return s ? JSON.parse(s) : { shopLink:CONFIG.shopLink, premiumLink:CONFIG.premiumLink };
}

function hasUsed(){ return CONFIG.enableOneUse && localStorage.getItem(CONFIG.usedStorageKey)==="true"; }
function markUsed(){ if(CONFIG.enableOneUse) localStorage.setItem(CONFIG.usedStorageKey,"true"); }

function setStep(s){
  state.step = s;
  const i = STEPS.indexOf(s);
  progFill.style.width = i < 0 ? "0%" : `${Math.round((i/(STEPS.length-1))*100)}%`;
}

function setReplies(arr){
  quickR.innerHTML = "";
  (arr||[]).forEach(r=>{
    const b = document.createElement("button");
    b.className = "quick-btn";
    b.textContent = r.label;
    b.onclick = ()=> handleReply(r.value, r.label);
    quickR.appendChild(b);
  });
  /* fait remonter le scroll du chatBox pour ne pas cacher
     le dernier message derrière les boutons */
  setTimeout(()=>{ chatBox.scrollTop = chatBox.scrollHeight; }, 60);
}

function resetState(){
  Object.keys(state).forEach(k=>{
    if(Array.isArray(state[k]))       state[k] = [];
    else if(typeof state[k]==="number") state[k] = 0;
    else                               state[k] = "";
  });
  state.redFlags = [];
}

/* ═══════════════════════════════════════════════════════════════════
   MESSAGES
═══════════════════════════════════════════════════════════════════ */
function showTyping(){
  const d = document.createElement("div");
  d.className = "typing"; d.id = "typingEl";
  d.innerHTML = `<span class="dot"></span><span class="dot"></span><span class="dot"></span>`;
  chatBox.appendChild(d);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function removeTyping(){ const d=document.getElementById("typingEl"); if(d) d.remove(); }

function addMsg(text, cls="bot", isHtml=false, delay=0){
  return new Promise(res => setTimeout(()=>{
    removeTyping();
    const d = document.createElement("div");
    if(isHtml){ d.className="msg html-msg"; d.innerHTML=text; }
    else       { d.className=`msg ${cls}`;  d.textContent=text; }
    chatBox.appendChild(d);
    chatBox.scrollTop = chatBox.scrollHeight;
    res();
  }, delay));
}

async function botSay(text, delay=560, isHtml=false){
  showTyping();
  await addMsg(text, "bot", isHtml, delay);
  chatBox.scrollTop = chatBox.scrollHeight;
}

/* ═══════════════════════════════════════════════════════════════════
   START
═══════════════════════════════════════════════════════════════════ */
function startChat(){
  if(hasUsed()){ showUsedScreen(); return; }
  chatForm.style.display = "flex";
  quickR.style.display   = "flex";
  resetState(); chatBox.innerHTML=""; setReplies([]);
  setStep("ask_name"); resetBtn.classList.remove("visible");

  addMsg("💛 Bienvenue chez Schicgirl. Je suis SchicChat, ton coach capillaire expert spécialisée en cheveux crépus type 4C.","bot");
  setTimeout(()=> botSay(
    "Je vais analyser tes cheveux comme une professionnelle : structure, porosité, cuir chevelu, casse, routine, alimentation, hormones et habitudes.\n\nTu recevras un diagnostic complet, une routine détaillée étape par étape, des recettes naturelles testées et un plan d'action sur 7 jours.\n\nCommençons. Comment souhaites-tu que je t'appelle ?",
    750
  ), 280);
}

function showUsedScreen(){
  const s = getSettings();
  chatBox.innerHTML=""; setReplies([]);
  progFill.style.width="100%";
  chatForm.style.display="none"; quickR.style.display="none";
  chatBox.innerHTML=`<div class="used-screen">
    <h2>Diagnostic déjà utilisé 💛</h2>
    <p>Tu as déjà bénéficié de ton diagnostic capillaire gratuit Schicgirl.</p>
    <p>Pour aller encore plus loin :</p>
    <p><a href="${s.shopLink}" target="_blank">💧 Guide Hydratation Cheveux Crépus</a></p>
    <p><a href="${s.premiumLink}" target="_blank">🌿 Diagnostic Capillaire Personnalisé Premium</a></p>
  </div>`;
}

/* ═══════════════════════════════════════════════════════════════════
   CONVERSATION
═══════════════════════════════════════════════════════════════════ */
async function handleReply(value, label=value){
  const raw=String(value).trim(), inp=norm(raw);
  addMsg(label,"user"); setReplies([]); userInput.value="";

  switch(state.step){

    /* ── Identité ──────────────────────────────────── */
    case "ask_name":
      state.name=raw; setStep("ask_contact");
      await botSay(`Ravie de te rencontrer, ${state.name} 💛\n\nSi tu le souhaites, partage ton e-mail ou ton WhatsApp pour sauvegarder ton diagnostic. Sinon, pas de souci — tu peux continuer sans.`);
      setReplies([{label:"Continuer sans contact",value:"skip"}]);
      break;

    case "ask_contact":
      state.contact=inp==="skip"?"":raw; setStep("ask_country");

/* ═══════════════════════════════════════════════════════════════════
   LEAD SAVE
═══════════════════════════════════════════════════════════════════ */
function saveLead(){
  const lead={...state, date:new Date().toISOString()};
  const leads=JSON.parse(localStorage.getItem(CONFIG.leadStorageKey)||"[]");
  leads.push(lead);
  localStorage.setItem(CONFIG.leadStorageKey,JSON.stringify(leads));
  if(!CONFIG.webAppUrl||CONFIG.webAppUrl.includes("PASTE")) return;
  const p=new URLSearchParams();
  p.append("action","saveLead"); p.append("token",CONFIG.clientToken);
  p.append("data",JSON.stringify(lead));
  fetch(CONFIG.webAppUrl,{method:"POST",body:p}).catch(()=>{});
}

/* ═══════════════════════════════════════════════════════════════════
   ANALYSE
═══════════════════════════════════════════════════════════════════ */
function analyzeProfile(){
  let score=10;
  const causes=[], redFlags=[];

  if(["two_weeks_plus","unknown"].includes(state.lastHydration)){ score-=2; causes.push("Hydratation trop espacée ou inexistante — la fibre se déshydrate profondément"); }
  else if(state.lastHydration==="week"){ score-=1; causes.push("Hydratation espacée — à augmenter progressivement"); }
  if(["monthly","rare"].includes(state.washFrequency)){ score-=1; causes.push("Fréquence de lavage trop basse — accumulation de sébum et produits"); }
  if(state.waterHardness==="hard"){ score-=1; causes.push("Eau calcaire — dépôts sur la cuticule bloquant les soins"); }
  if(state.routine==="none"){ score-=2; causes.push("Aucune routine capillaire — sans régularité, aucun progrès durable n'est possible"); }
  else if(state.routine==="unstable"){ score-=1; causes.push("Routine irrégulière — la constance prime sur la perfection"); }
  if(["random","unknown"].includes(state.lco)){ score-=1; causes.push("Ordre d'application des produits non maîtrisé — l'hydratation est moins efficace"); }
  if(state.breakage==="high"){ score-=2; causes.push("Casse abondante — fibre fragilisée par sécheresse, manque de protéines ou manipulation agressive"); }
  else if(state.breakage==="medium"){ score-=1; causes.push("Casse modérée à surveiller"); }
  if(["bad","severe"].includes(state.splitEnds)){ score-=1; causes.push("Pointes très abîmées — micro-coupe et protection intensive nécessaires"); }
  if(state.porosity==="high"){ score-=1; causes.push("Porosité élevée — absorption rapide mais rétention d'hydratation insuffisante"); }
  if(["chemical","color"].includes(state.heatDamage)){ score-=2; causes.push("Historique chimique — structure de la fibre altérée, reconstruction progressive indispensable"); redFlags.push("Historique chimique : évite tout nouveau traitement chimique. Renforce la structure progressivement avec des soins protéinés doux."); }
  if(state.heatDamage==="heat"){ score-=1; causes.push("Dommages thermiques accumulés — chaleur sans protection fragilise la cuticule"); }
  if(state.elasticity==="low"){ score-=2; causes.push("Élasticité très faible — signe de carence sévère en protéines ou en hydratation profonde"); redFlags.push("Élasticité faible : commence un plan protéines + hydratation sur 4 à 6 semaines avant tout autre objectif."); }
  if(state.scalp==="irritated"){ score-=1; causes.push("Cuir chevelu irrité ou inflammé"); redFlags.push("Cuir chevelu irrité persistant (démangeaisons intenses, plaques, douleur, chute localisée) : consulte un dermatologue."); }
  if(state.dandruff==="severe"){ score-=1; causes.push("Squames importantes — possiblement dermite séborrhéique"); redFlags.push("Squames épaisses ou croûtes : peut être une dermite séborrhéique nécessitant un traitement médical."); }
  if(state.styles==="tight"){ score-=2; causes.push("Coiffures trop serrées — traction chronique sur le follicule, risque d'alopécie de traction"); redFlags.push("Coiffures très serrées : l'alopécie de traction est irréversible une fois installée. Stoppe les styles en tension immédiatement."); }
  if(["rough","sometimes_dry"].includes(state.detangling)){ score-=2; causes.push("Démêlage agressif ou à sec — première cause de casse mécanique en cheveux crépus"); }
  if(state.accessories==="none"){ score-=1; causes.push("Pas de protection nocturne — le coton absorbe l'hydratation et provoque des frottements toute la nuit"); }
  if(state.accessories==="elastic"){ score-=1; causes.push("Élastiques avec métal — créent des points de casse très localisés"); }
  if(state.heat==="often"){ score-=2; causes.push("Chaleur trop fréquente — dommages thermiques cumulatifs sur la kératine"); }
  if(state.heat!=="rare"&&state.heat!=="cool"&&state.heatProtectant!=="always"){ score-=1; causes.push("Chaleur utilisée sans protection thermique systématique"); }
  if(state.buildup==="no_retention"){ score-=1; causes.push("Rétention d'hydratation très courte — problème de porosité ou de scellage"); }
  if(state.buildup==="heavy"){ score-=1; causes.push("Accumulation de produits — bloque la pénétration des soins"); }
  if(["low","poor"].includes(state.water)){ score-=1; causes.push("Hydratation interne insuffisante — la fibre capillaire reflète l'état hydrique global du corps"); }
  if(state.foodProtein==="rare"){ score-=1; causes.push("Apport protéique alimentaire insuffisant — la kératine a besoin de matière première"); }
  if(["high","chronic"].includes(state.stressSleep)){ score-=1; causes.push("Stress élevé ou sommeil insuffisant — perturbent le cycle pilaire et fragilisent la fibre"); }
  if(["postpartum","hormonal_issue","menopause"].includes(state.hormonal)){ score-=1; causes.push("Déséquilibre hormonal — impacte directement le cycle de pousse et la densité"); redFlags.push("Contexte hormonal : un bilan médical (gynécologue, endocrinologue) peut compléter utilement les soins capillaires."); }

  score = Math.max(1, score);

  let profile="Routine à construire", priority="établir une base saine et cohérente";
  let summary="Tes cheveux ont besoin d'une routine claire. Sans base stable, les soins ponctuels ne produisent pas de résultats durables.";
  let offer="Routine Capillaire Personnalisée";

  if(state.mainProblem==="dryness"||state.goal==="hydration"||["two_weeks_plus","unknown"].includes(state.lastHydration)){
    profile="Sécheresse chronique — hydratation à reconstruire"; offer="Guide Hydratation";
    priority=state.porosity==="high"?"améliorer la rétention d'hydratation et sceller efficacement":"faire pénétrer l'hydratation durablement sans surcharger";
    summary="Tes cheveux sont en état de déshydratation profonde. La cuticule se referme, les soins glissent sans pénétrer. La solution n'est pas plus de produits — c'est une meilleure méthode, un ordre précis et une régularité.";
  }
  if(state.mainProblem==="growth"||state.goal==="length"){
    profile="Longueur bloquée — rétention insuffisante"; offer="Programme Pousse & Rétention";
    priority="protéger les pointes, réduire la casse et retenir chaque centimètre produit";
    summary="Tes cheveux poussent déjà — environ 1 à 1,5 cm par mois. Si tu ne vois pas de longueur, les pointes cassent aussi vite qu'elles poussent. L'enjeu est la rétention, pas la stimulation.";
  }
  if(state.mainProblem==="breakage"||state.breakage==="high"||state.goal==="stop_breakage"){
    profile="Casse active — fibre fragilisée"; offer="Routine Anti-Casse";
    priority="identifier la source précise de la casse, renforcer la fibre et sécuriser chaque manipulation";
    summary="La casse peut venir d'un manque de protéines, d'une déshydratation sévère, d'un démêlage agressif, d'une protection nocturne absente — ou d'une combinaison de tout cela. On va corriger point par point.";
  }
  if(state.mainProblem==="hairloss"||state.goal==="edges"||state.styles==="tight"){
    profile="Tempes et follicules en danger"; offer="Programme Tempes & Repousse Douce";
    priority="stopper la traction, apaiser les follicules et créer un environnement favorable à la repousse";
    summary="Les tempes réclament une action immédiate. L'alopécie de traction est silencieuse au début mais peut devenir permanente. Chaque semaine de traitement compte.";
  }
  if(state.mainProblem==="scalp_issue"||state.goal==="scalp_health"||state.scalp==="irritated"){
    profile="Cuir chevelu perturbé — priorité santé"; offer="Programme Cuir Chevelu Sain";
    priority="rééquilibrer le cuir chevelu avant tout travail sur les longueurs";
    summary="Un cuir chevelu sain est la fondation de tout. Inutile d'empiler les soins sur les longueurs si le terrain n'est pas en ordre. La santé commence au follicule.";
  }
  if(state.mainProblem==="lost"||state.goal==="simple"){
    profile="Surcharge d'informations — besoin de clarté"; offer="Diagnostic Personnalisé Premium";
    priority="créer une routine simple, lisible et réaliste à tenir sur la durée";
    summary="Trop d'informations contradictoires paralysent plus qu'elles n'aident. On va éliminer le bruit et garder uniquement ce qui est essentiel pour TES cheveux.";
  }

  const causesText = causes.length ? causes.map(c=>`• ${c}`).join("\n") : "• Aucun blocage majeur — la régularité reste le facteur clé.";

  return {
    score, profile, priority, offer, summary,
    causes: causesText, redFlags,
    coachReading: buildCoachReading(),
    routine: buildRoutine(profile),
    recipes: buildRecipes(),
    plan7: buildPlan7(profile),
    expectedResults: buildExpectedResults(),
    warnings: buildWarnings(redFlags),
    bonus: buildBonus()
  };
}

/* ── Lecture coach ──────────────────────────────────── */
function buildCoachReading(){
  const p=[];
  if(state.porosity==="low")     p.push("Porosité faible : tes cuticules sont serrées et résistantes. Les soins peinent à pénétrer. Solution : toujours appliquer sur cheveux très humides, en petites sections, avec chaleur douce (bonnet vapeur ou serviette chaude 15 min pendant le masque). Évite les silicones non hydrosolubles qui forment un film imperméable.");
  if(state.porosity==="high")    p.push("Porosité élevée : tes cuticules sont ouvertes. Les soins absorbent vite mais l'eau s'évapore tout aussi rapidement. Ta règle : hydrater et sceller sans laisser sécher entre les étapes. Rinçage final à l'eau froide obligatoire — cela referme la cuticule. Les soins légèrement acidifiants (aloe vera, rinçage ACV dilué) améliorent la rétention.");
  if(state.porosity==="normal")  p.push("Porosité normale : cuticule équilibrée. Concentre-toi sur la régularité et l'ajustement saisonnier des produits. Observe la souplesse 48h après le soin — c'est ton meilleur indicateur.");
  if(state.porosity==="unknown") p.push("Porosité non déterminée : fais le test cette semaine — c'est l'information la plus utile de ta routine. Elle conditionne le choix des produits, la méthode d'application et la fréquence des soins.");
  if(state.elasticity==="low")   p.push("Élasticité faible — signal prioritaire : tes cheveux manquent soit de protéines (fibre structurellement fragile), soit d'hydratation profonde (fibre rigide et cassante), soit des deux. Commence par 4 semaines d'alternance soin protéiné / soin hydratant avant de travailler sur d'autres objectifs.");
  if(state.elasticity==="good")  p.push("Bonne élasticité : excellent signal. Tes cheveux conservent une structure souple et résiliente. Maintiens l'équilibre protéines / hydratation — c'est ce qui protège la fibre sur le long terme.");
  if(["4c","4b4c"].includes(state.texture)) p.push("Texture 4C / 4B-4C : tes coils très serrés créent une surface naturellement pauvre en sébum sur les longueurs. Le sébum produit au cuir chevelu descend difficilement le long de la fibre — d'où la sécheresse structurelle chronique des longueurs et des pointes. Travailler en 8 sections minimum est non négociable pour toi.");
  if(state.subTexture==="multi_zone") p.push("Zones multiples : tes différentes zones demandent un traitement ciblé. Les tempes plus fines ont besoin de moins de produit et plus de douceur. La nuque plus serrée peut nécessiter davantage de temps de démêlage. Coiffe zone par zone plutôt qu'en masse.");
  if(state.thickness==="fine")   p.push("Mèches fines : les beurres épais et l'huile de ricin pure vont étouffer ta fibre. Préfère des leave-ins légers à base d'eau et des huiles légères (jojoba, pépins de raisin). Applique toujours peu à la fois — mieux vaut rajouter que d'en avoir trop.");
  if(state.thickness==="thick")  p.push("Mèches épaisses : tes cheveux ont besoin de soins riches pour être nourris en profondeur. Le beurre de karité et les masques à l'avocat sont bien adaptés. Assure-toi de bien saturer chaque section.");
  if(state.density==="high")     p.push("Forte densité : les sections ne sont pas optionnelles — elles sont nécessaires. Sans sections définies, ni le shampooing, ni le masque, ni l'hydratation ne peuvent atteindre uniformément l'ensemble de ta chevelure.");
  if(state.waterHardness==="hard") p.push("Eau calcaire : le calcium et le magnésium de l'eau dure se déposent sur la cuticule et créent une couche imperméable qui bloque les soins. Solutions concrètes : rinçage final au vinaigre de cidre dilué (1 c.s. pour 500 ml), filtre de douche, ou utilisation d'eau filtrée ou minérale pour tes masques.");
  if(["rough","sometimes_dry"].includes(state.detangling)) p.push("Démêlage agressif : c'est probablement ta première source de casse. La règle absolue : jamais à sec, jamais sans produit glissant, toujours des pointes vers les racines, toujours en sections définies. Un bon démêlage peut réduire la casse de 60 à 80 % à lui seul.");
  if(["random","unknown"].includes(state.lco)) p.push("LCO non maîtrisée : l'ordre d'application change tout. LCO (Leave-in → Crème → Huile) est la méthode la plus efficace pour les cheveux crépus. L'huile en dernier scelle l'hydratation apportée. Si tu appliques l'huile en premier, elle crée une barrière qui empêche la crème de pénétrer.");
  if(state.heatDamage==="chemical") p.push("Historique de défrisage : les liaisons disulfure qui donnent le coil à tes cheveux ont été cassées chimiquement. La repousse naturelle est saine, mais la démarcation entre cheveux naturels et parties défrisées est une zone de casse chronique. Traitement : soins protéinés doux + grande douceur sur les 10 à 20 cm de démarcation.");
  if(state.hormonal==="postpartum") p.push("Post-partum : la chute télogène post-partum est normale — elle survient entre 2 et 6 mois après l'accouchement suite à la chute brutale des œstrogènes. Elle s'arrête d'elle-même. Priorité : zéro tension sur les follicules, compléments en fer et zinc si déficit, patience.");
  if(state.hormonal==="hormonal_issue") p.push("SOPK ou thyroïde : ces conditions affectent directement le cycle pilaire. Un bilan sanguin (TSH, fer, ferritine, zinc, vitamine D) permet d'identifier les carences à corriger. Les soins externes seuls ne suffisent pas.");
  if(state.accessories==="none") p.push("Absence de protection nocturne : 7 à 8 heures de friction sur du coton chaque nuit — cela arrache la cuticule, absorbe l'hydratation et crée des nœuds. Un bonnet ou une taie satin est l'investissement capillaire le plus rentable qui existe, avant n'importe quel produit.");
  return p.join("\n\n") || "Tes cheveux présentent un profil équilibré. Concentre-toi sur la régularité et observe sur 4 à 6 semaines.";
}

/* ── Routines ───────────────────────────────────────── */
function porosityNote(){
  if(state.porosity==="low")    return "\n📌 POROSITÉ FAIBLE : applique toujours sur cheveux très humides + chaleur douce pendant le masque (bonnet vapeur ou serviette chaude). La chaleur ouvre la cuticule et permet l'absorption.";
  if(state.porosity==="high")   return "\n📌 POROSITÉ ÉLEVÉE : enchaîne les étapes sans laisser sécher. Termine toujours par un rinçage à l'eau froide pour refermer la cuticule. Scelle toujours, sans exception.";
  if(state.porosity==="normal") return "\n📌 POROSITÉ NORMALE : maintiens l'équilibre protéines/hydratation. Ajuste selon la souplesse observée 48h après chaque soin.";
  return "";
}

function buildRoutine(profile){
  let r="";
  if(profile.includes("Sécheresse"))             r=routineHydration();
  else if(profile.includes("Longueur"))          r=routineGrowth();
  else if(profile.includes("Casse"))             r=routineBreakage();
  else if(profile.includes("Tempes"))            r=routineEdges();
  else if(profile.includes("Cuir chevelu"))      r=routineScalp();
  else                                           r=routineFoundation();
  const notes=[];
  if(state.waterHardness==="hard")               notes.push("💧 EAU CALCAIRE : ajoute 1 c.s. de vinaigre de cidre dans 500 ml d'eau pour ton rinçage final. Élimine les dépôts calcaires et referme la cuticule.");
  if(["none","elastic"].includes(state.accessories)) notes.push("🌙 NUIT : commence dès ce soir avec un bonnet ou une taie satin. Sans cela, tous tes soins seront partiellement annulés chaque nuit.");
  if(state.heatDamage==="chemical")              notes.push("⚠️ DÉMARCATION : plus de soin et plus de douceur sur la zone entre ta repousse naturelle et les anciens cheveux défrisés — c'est la zone la plus fragile.");
  if(notes.length) r+="\n\n📌 NOTES PERSONNALISÉES POUR TOI\n"+notes.join("\n");
  return r;
}

function routineHydration(){
  return `🎯 OBJECTIF : Réintroduire une hydratation profonde et durable dans chaque fibre.

JOUR DE SOIN COMPLET — 1 fois par semaine

① Bain d'huile pré-shampooing (pre-poo) — 30 à 60 min
Applique un mélange d'huile de coco + huile d'avocat sur les longueurs et les pointes (pas le cuir chevelu). Couvre d'un bonnet. Ce soin protège la fibre de l'agression du shampooing.

② Démêlage avant le lavage
8 sections minimum. Après-shampooing ou crème démêlante. Des pointes vers les racines. Doigts d'abord, peigne à dents larges ensuite. Jamais à sec, jamais sans produit.

③ Nettoyage du cuir chevelu
Shampooing doux (sans sulfate SLS/SLES agressif). Cuir chevelu uniquement, massage avec la pulpe des doigts. Les longueurs se nettoient au rinçage — ne les frotte pas. Rinçage complet à l'eau tiède.

④ Masque hydratant intensif — 30 à 45 min
Applique généreusement sur cheveux essorés, section par section. Couvre d'un bonnet plastique puis d'une serviette chaude ou d'un bonnet vapeur. Rince à l'eau tiède puis FROIDE en dernier.

⑤ Méthode LCO (obligatoire, dans cet ordre)
L — Leave-in ou lait hydratant : sur cheveux humides, section par section.
C — Crème hydratante : scelle l'eau apportée par le leave-in.
O — Huile légère : scelle l'ensemble et protège les pointes.
→ Ne jamais sauter l'huile — c'est elle qui retient l'hydratation.

⑥ Coiffure de protection légère
Vanilles larges, tresses simples ou chignon bas. Évite tout ce qui tire.

MILIEU DE SEMAINE — 2 à 3 fois

• Spray maison : 70% eau minérale + 20% aloe vera + 10% glycérine végétale.
• Vaporise sur les longueurs. Presse doucement sans frotter.
• Si les cheveux restent secs : augmente la fréquence ou ajoute une légère crème hydratante.

NUIT — Chaque soir
• Bonnet ou taie satin obligatoire.
• 4 grosses vanilles lâches si les cheveux s'emmêlent.
• Quelques gouttes d'huile légère sur les pointes si sécheresse persistante.
${porosityNote()}`;
}

function routineGrowth(){
  return `🎯 OBJECTIF : Retenir la longueur — le follicule produit déjà 1 à 1,5 cm/mois.

LES POINTES D'ABORD — TOUJOURS
Les pointes sont les parties les plus vieilles, les plus sèches et les plus fragiles. Elles réclament l'essentiel de ton attention à chaque soin.

JOUR DE SOIN — 1 fois par semaine

① Bain d'huile 1 heure avant le lavage (longueurs et pointes uniquement).
② Shampooing doux cuir chevelu + rinçage soigneux.
③ Masque hydratant 35 min — insiste sur les pointes.
④ LCO : Leave-in → Crème → Huile légère, section par section.
⑤ Coiffure protectrice légère.

MILIEU DE SEMAINE
• Spray eau + aloe vera sur les longueurs.
• Huile légère sur les pointes seulement.
• Si les pointes sont très sèches : une fine couche de beurre de karité fondu.

MASSAGE DU CUIR CHEVELU — 3 fois/semaine
3 à 5 minutes, pulpe des doigts, mouvements circulaires. Option : quelques gouttes d'huile de romarin diluée (stimulation prouvée de la microcirculation folliculaire).

MICRO-COUPE PRÉVENTIVE — toutes les 10 à 12 semaines
1 à 2 cm de pointes abîmées enlevées = moins de fourches qui remontent = plus de rétention de longueur.

COIFFURES — règles d'or
• Une coiffure peut durer 3 à 7 jours — évite de recoiffer tous les jours.
• Aucune mèche lourde, aucune tresse trop serrée aux tempes.
• Dors toujours avec un bonnet satin + grosses vanilles.
${porosityNote()}`;
}

function routineBreakage(){
  return `🎯 OBJECTIF : Identifier la source de la casse et la supprimer.

TEST DE DIAGNOSTIC DE LA CASSE
Prends 10 cheveux tombés après ton dernier soin et observe :
→ Très courts (< 3 cm) : casse en racine = manipulation trop agressive ou tension.
→ Mi-longueur : casse dans la fibre = sécheresse ou carence en protéines.
→ Longs avec fourche : casse aux pointes = pointes non protégées.
→ Avec bulbe blanc au bout : chute naturelle (normale, 50 à 100/jour).

DÉMÊLAGE SANS DOMMAGE — règle absolue
• Jamais à sec. Jamais sans produit glissant. Jamais avec un peigne fin.
• 8 à 12 sections. Des pointes vers les racines. Doigts d'abord.
• Si un nœud résiste : plus de produit, attends 2 min, réessaie — n'arrache jamais.

RÉÉQUILIBRE PROTÉINES / HYDRATATION
• Manque de protéines : cheveux qui s'étirent sans reprendre leur forme, élasticité nulle.
• Excès de protéines : cheveux rêches, durs, qui "craquent" au toucher.
• Plan : soin protéiné léger → soin hydratant intensif la semaine suivante. Alterne.

HYDRATATION LCO COMPLÈTE
• Leave-in + Crème + Huile à chaque soin, section par section.
• Double attention sur les zones qui cassent le plus.

POINTES TRÈS ABÎMÉES
Si transparentes, qui s'émiettent ou se bifurquent : micro-coupe de 1 à 2 cm + protection immédiate leave-in + huile.

PROTECTION NOCTURNE INTENSIVE
• Bonnet satin + grosses vanilles avant de dormir.
• Si les cheveux s'emmêlent beaucoup la nuit : tresse-les en 4 grosses tresses lâches.
${porosityNote()}`;
}

function routineEdges(){
  return `🎯 OBJECTIF : Stopper la traction, apaiser les follicules, permettre la repousse.

⛔ À FAIRE IMMÉDIATEMENT — avant tout
Stoppe toutes les coiffures serrées : tresses collées serrées, lace trop tendue, chignons tirés, gel de fixation fort sur les tempes. Une traction répétée sur le follicule peut mener à l'alopécie de traction irréversible. La règle : si tu sens une tension en portant ta coiffure → trop serré.

PHASE 1 — REPOS COMPLET (semaines 1 à 4)
Coiffures autorisées uniquement : afro puff très doux, foulard en satin, vanilles très lâches, chignon bas sans tension.
Aucun gel, cire ou produit fixant sur les tempes.

PHASE 2 — SOIN CIBLÉ DES TEMPES (dès la semaine 1)
• Hydratation légère : spray eau minérale + aloe vera 2 à 3 fois/semaine.
• Applique avec les doigts délicatement — ne frotte pas.
• Option : mélange huile de ricin + huile de jojoba (50/50) — quelques gouttes sur les tempes uniquement.

PHASE 3 — MASSAGE DE STIMULATION
• Pulpe des doigts, mouvements circulaires très doux, 2 à 3 min, 3 fois/semaine.
• Option : huile de romarin diluée (5 gouttes dans 30 ml de jojoba).
• Ne gratte pas avec les ongles — tu stimules la circulation, pas le follicule.

PHASE 4 — SOIN GLOBAL HEBDOMADAIRE
Shampooing doux → masque hydratant 35 min → LCO sur les longueurs.

SUIVI
Photo hebdomadaire dans les mêmes conditions de lumière. Des "baby hairs" sur les tempes = signe de repousse active. Observe sur 6 à 12 semaines.

CONSULTE UN MÉDECIN SI
Chute soudaine et massive, plaques sans repousse, douleur, brûlure, démangeaisons intenses persistantes.
${porosityNote()}`;
}

function routineScalp(){
  return `🎯 OBJECTIF : Rééquilibrer le cuir chevelu — la fondation de tout.

NETTOYAGE ADAPTÉ À TON PROFIL
• Cuir chevelu sec : shampooing très doux, 1 fois toutes les 2 semaines. Co-wash entre les lavages.
• Cuir chevelu gras : shampooing doux 1 fois/semaine. Ne masse pas les longueurs (stimule le sébum).
• Cuir chevelu irrité : shampooing apaisant (aloe vera, zinc). Eau tiède — jamais chaude. Rinçage très soigneux.
• Pellicules : shampoing antipelliculaire doux (zinc pyrithione) 1 fois sur 2.

SOIN CIBLÉ CUIR CHEVELU
• Lotion légère : aloe vera pur + quelques gouttes de tea tree dilué.
• Applicateur embout fin ou doigts, section par section.
• Ne sature pas le cuir chevelu — moins c'est plus.

MASSAGE HEBDOMADAIRE
5 minutes, 2 à 3 fois/semaine, pulpe des doigts, mouvements circulaires lents.
Améliore la microcirculation et régule la production de sébum.

ENVIRONNEMENT
• Change la taie d'oreiller 2 fois/semaine.
• Nettoie tes brosses et accessoires régulièrement.
• Évite de faire descendre les produits pour longueurs sur le cuir chevelu.
${porosityNote()}`;
}

function routineFoundation(){
  return `🎯 OBJECTIF : Construire une base simple, cohérente et tenable sur la durée.

LES 5 ESSENTIELS (et rien d'autre au début)
① 1 shampooing doux sans sulfate agressif
② 1 masque hydratant (aloe vera, yaourt, avocat)
③ 1 leave-in ou lait hydratant à base d'eau
④ 1 huile légère (jojoba, avocat ou pépins de raisin)
⑤ 1 bonnet ou taie d'oreiller en satin

JOUR DE SOIN — 1 fois par semaine ou toutes les 2 semaines

① Démêlage en sections avec après-shampooing, des pointes vers les racines.
② Shampooing cuir chevelu uniquement, rinçage complet.
③ Masque hydratant 25 à 30 min, rinçage à l'eau froide.
④ LCO : Leave-in → Crème → Huile légère, section par section.
⑤ Coiffure légère : vanilles, tresses ou afro puff souple.

MILIEU DE SEMAINE
Spray eau + aloe vera si les longueurs sèchent. Huile sur les pointes. Pas besoin de refaire tout le soin.

NUIT — Chaque soir
Bonnet satin ou taie satin. Vanilles lâches si les cheveux s'emmêlent.
${porosityNote()}`;

function buildRecipes(){
  const r=[];

  /* Masque hydratant selon porosité */
  if(state.porosity==="low"){
    r.push({
      titre:"🧪 Masque vapeur – Porosité faible",
      ing:["3 c.s. de gel d'aloe vera frais ou pur","1 c.s. de miel brut (humectant puissant)","1 c.c. d'huile de jojoba (légère, similaire au sébum)","1 c.c. de glycérine végétale (attire l'humidité atmosphérique)"],
      prep:"Mélange tous les ingrédients. Applique sur cheveux propres et très humides, section par section.",
      pose:"30 à 45 min sous bonnet plastique + serviette chaude ou bonnet vapeur.",
      rincage:"Eau tiède puis eau froide.",
      freq:"1 fois par semaine.",
      science:"La chaleur douce ouvre les cuticules résistantes. La glycérine et le miel attirent l'humidité dans la fibre."
    });
  } else if(state.porosity==="high"){
    r.push({
      titre:"🧪 Masque rétention – Porosité élevée",
      ing:["2 c.s. de gel d'aloe vera","1 c.s. de miel brut","1 c.s. d'avocat bien mûr écrasé (lipides réparateurs)","1 c.c. d'huile d'olive extra vierge","1 c.c. de beurre de karité fondu"],
      prep:"Mixe ou fouette. Texture doit être crémeuse.",
      pose:"35 à 45 min sous bonnet plastique — pas besoin de chaleur externe.",
      rincage:"Eau tiède puis eau FROIDE obligatoire pour refermer la cuticule.",
      freq:"1 fois par semaine.",
      science:"Les lipides de l'avocat et du karité comblent partiellement les failles de la cuticule. Le rinçage froid referme ce que la cuticule ne peut plus faire seule."
    });
  } else {
    r.push({
      titre:"🧪 Masque équilibre universel",
      ing:["2 c.s. de yaourt nature entier (protéines douces + acides lactiques)","1 c.s. de miel brut","1 c.s. d'aloe vera gel","1 c.s. d'huile d'amande douce ou d'avocat"],
      prep:"Mélange et applique généreusement sur longueurs et pointes.",
      pose:"25 à 35 min sous bonnet.",
      rincage:"Eau tiède puis froide.",
      freq:"1 fois par semaine.",
      science:"Les acides lactiques du yaourt abaissent légèrement le pH, ce qui aide à fermer la cuticule. Les protéines du yaourt renforcent doucement sans rigidifier."
    });
  }

  /* Soin protéiné si nécessaire */
  if(state.breakage==="high"||state.elasticity==="low"||state.heatDamage==="chemical"){
    r.push({
      titre:"💪 Soin protéiné reconstruction – Casse / Élasticité faible",
      ing:["3 c.s. de yaourt grec nature (forte concentration protéique)","1 œuf entier (protéines complètes + lécithine émolliente)","1 c.s. de miel (contrebalance l'effet asséchant)","1 c.c. d'huile de ricin (fortifiant)"],
      prep:"Mélange bien, surtout l'œuf. Applique en sections sur longueurs et pointes.",
      pose:"20 à 25 min MAX — ne dépasse pas. Excès = cheveux durs et cassants.",
      rincage:"Eau froide ou tiède uniquement (jamais chaude — l'œuf cuit dans les cheveux).",
      important:"Toujours suivre d'un masque hydratant la semaine suivante. Protéines seules = asséchement.",
      freq:"1 fois toutes les 3 à 4 semaines maximum.",
      science:"Les protéines de l'œuf et du yaourt reconstituent temporairement la kératine, améliorant l'élasticité et réduisant la casse mécanique."
    });
  }

  /* Spray quotidien */
  r.push({
    titre:"💦 Spray hydratation quotidienne (LCO step 1)",
    ing:["200 ml d'eau minérale ou filtrée (évite l'eau du robinet calcaire)","2 c.s. de gel d'aloe vera pur","1 c.c. de glycérine végétale","3 gouttes d'HE de lavande (optionnel — apaisant)"],
    prep:"Mélange dans un flacon spray propre. Secoue avant chaque utilisation.",
    util:"Vaporise à 20 cm des longueurs. Presse doucement. Ne sature pas.",
    freq:"2 à 3 fois/semaine ou chaque jour si les cheveux sont très secs.",
    conservation:"7 jours à température ambiante. 2 semaines au réfrigérateur.",
    science:"La glycérine est un humectant puissant qui attire l'humidité de l'air dans la fibre. L'aloe vera hydrate et apaise simultanément."
  });

  /* Huile romarin */
  r.push({
    titre:"🌿 Huile stimulante au romarin – Cuir chevelu",
    ing:["50 ml d'huile de jojoba (huile porteuse légère)","10 à 15 gouttes d'HE de romarin (Rosmarinus officinalis)","Optionnel : 5 gouttes d'HE de menthe poivrée (stimulante)"],
    prep:"Mélange dans un flacon sombre (protège des UV).",
    util:"4 à 5 gouttes sur le cuir chevelu, section par section. Masse 3 à 5 minutes.",
    freq:"2 à 3 fois/semaine — pas tous les jours.",
    important:"Ne jamais appliquer d'HE pure sur le cuir chevelu. Test patch obligatoire (intérieur du poignet, 24h).",
    conservation:"6 mois à l'abri de la lumière.",
    science:"Une étude de 2023 (Skinmed Journal) a montré que l'huile de romarin est aussi efficace que le minoxidil 2% pour stimuler la croissance capillaire, sans ses effets secondaires."
  });

  /* Bain d'huile */
  r.push({
    titre:"🛁 Bain d'huile pré-shampooing (Pre-poo)",
    ing:["2 c.s. d'huile de coco vierge (seule huile qui pénètre dans le cortex)","1 c.s. d'huile d'avocat (émolliente, riche en vitamine E)","1 c.s. d'huile de ricin (fortifiante)","Optionnel : 1 c.c. de miel dilué dans un peu d'eau tiède"],
    prep:"Mélange et fais tiédir au bain-marie ou dans tes mains.",
    util:"Longueurs et pointes uniquement — pas le cuir chevelu. Démêle doucement pendant l'application.",
    pose:"30 min minimum sous bonnet. Jusqu'à 2h ou toute la nuit pour un effet maximal.",
    rincage:"Directement au shampooing — ne rince pas à l'eau avant.",
    freq:"Avant chaque shampooing.",
    science:"Le bain d'huile crée une barrière lipidique qui protège la fibre de l'hygral fatigue (gonflement et contraction répétés lors du lavage). L'huile de coco est l'une des seules à pénétrer réellement dans le cortex capillaire."
  });

  /* Rinçage ACV */
  if(state.waterHardness==="hard"||state.waterHardness==="unknown"){
    r.push({
      titre:"🍎 Rinçage ACV – Anti-calcaire & brillance",
      ing:["500 ml d'eau minérale ou filtrée","1 c.s. de vinaigre de cidre brut non filtré (avec la mère)","Optionnel : 3 gouttes d'HE de romarin"],
      prep:"Mélange dans une bouteille à presser.",
      util:"Après le dernier rinçage du masque : verse sur l'ensemble des cheveux, masse légèrement 1 min, rince à l'eau froide.",
      freq:"1 fois par semaine ou à chaque lavage si eau très calcaire.",
      important:"L'odeur du vinaigre disparaît en quelques minutes de séchage.",
      science:"Le pH légèrement acide du vinaigre de cidre (pH 3-4) referme la cuticule, neutralise les dépôts alcalins du calcaire et restaure l'éclat naturel."
    });
  }

  /* Masque cuir chevelu irrité */
  if(state.scalp==="irritated"||["regular","severe"].includes(state.dandruff)){
    r.push({
      titre:"🌱 Masque apaisant cuir chevelu irrité / pellicules",
      ing:["3 c.s. de gel d'aloe vera pur","1 c.s. d'huile de jojoba","3 gouttes d'HE de tea tree (antifongique, antiseptique)","2 gouttes d'HE de lavande vraie (calmante)"],
      prep:"Mélange. Applique avec un applicateur embout fin directement sur le cuir chevelu.",
      pose:"20 à 30 minutes. Lave au shampooing doux après.",
      freq:"1 à 2 fois/semaine.",
      important:"Toujours diluer les HE. Ne pas appliquer pur sur cuir chevelu irrité.",
      science:"Le tea tree a des propriétés antifongiques contre le Malassezia (champignon responsable des pellicules). L'aloe vera neutralise l'inflammation immédiatement."
    });
  }

  return r;
}

/* ── Plan 7 jours ───────────────────────────────────── */
function buildPlan7(profile){
  if(profile.includes("Tempes"))return`Jour 1 🛑 ARRÊT IMMÉDIAT de toutes les coiffures serrées. Photo de départ des zones fragiles.
Jour 2 💧 Hydratation légère des tempes (spray aloe vera + eau).
Jour 3 🌿 Massage doux des tempes 3 min (huile jojoba + romarin).
Jour 4 🎀 Coiffure ultra-légère uniquement — afro puff, foulard ou vanilles très lâches.
Jour 5 🧪 Soin complet hydratant — masque 35 min + LCO.
Jour 6 💤 Repos complet — bonnet satin, zéro manipulation.
Jour 7 📸 Photo de suivi + bilan : zones moins tirées ? Moins de tension au port ?`;
  if(profile.includes("Casse")||profile.includes("Longueur"))return`Jour 1 🔍 Test de diagnostic : observe 10 cheveux tombés. Quelle zone ? Quelle longueur ?
Jour 2 🧪 Soin complet : bain d'huile 1h → shampooing → masque 40 min → LCO.
Jour 3 🎀 Coiffure protectrice légère (vanilles larges). Bonnet satin le soir.
Jour 4 💧 Spray hydratation maison sur les longueurs. Huile légère sur les pointes.
Jour 5 💆 Massage cuir chevelu 5 min (huile de romarin diluée).
Jour 6 💪 Soin protéiné si élasticité faible (masque yaourt + œuf + miel — 20 min).
Jour 7 📸 Photo + bilan : moins de petits cheveux dans le peigne ?`;
  if(profile.includes("Sécheresse"))return`Jour 1 🧪 Soin intensif complet : bain d'huile 1h → shampooing → masque vapeur 45 min → LCO.
Jour 2 💧 Spray hydratation DIY sur les longueurs (eau + aloe + glycérine).
Jour 3 🌙 Bonnet satin + vanilles lâches. Zéro manipulation.
Jour 4 💧 Re-spray hydratation + une couche légère d'huile sur les pointes.
Jour 5 💆 Massage cuir chevelu 3 à 5 min.
Jour 6 🔄 Test : les cheveux tiennent-ils l'hydratation plus de 48h ?
Jour 7 📸 Photo + bilan texture. Ajuster la fréquence si encore secs.`;
  return`Jour 1 📋 Note ta routine actuelle et ce qui ne fonctionne pas.
Jour 2 🧪 Premier soin complet : shampooing + masque 30 min + LCO.
Jour 3 🌙 Bonnet satin cette nuit — si tu n'en as pas, commande-le aujourd'hui.
Jour 4 💧 Spray eau + aloe vera sur les longueurs. Observe la rétention.
Jour 5 💆 Massage cuir chevelu 3 min. Huile légère sur les pointes.
Jour 6 🛁 Bain d'huile 1h avant un nouveau soin si les cheveux restent secs.
Jour 7 📸 Photo + bilan : qu'est-ce qui a changé depuis le jour 1 ?`;
}

/* ── Résultats ──────────────────────────────────────── */
function buildExpectedResults(){
  return`Semaines 1 et 2 : cheveux plus souples au toucher, démêlage plus facile, moins de sensation rêche. L'hydratation commence à tenir plus longtemps.

Semaines 3 et 4 : nette réduction de la casse au démêlage. Pointes moins sèches. Cuir chevelu plus confortable. La routine devient plus instinctive.

Mois 2 : tes cheveux commencent à te "parler" — tu reconnais les signaux de sécheresse, de surcharge et de besoin protéiné. Les ajustements deviennent intuitifs.

Mois 3 : rétention de longueur améliorée si les pointes ont été protégées. Cuir chevelu équilibré. Routine ancrée.

📌 La constance vaut mieux que la perfection. Une routine correcte 4 semaines sur 4 produit plus de résultats qu'une routine parfaite 1 semaine sur 4.`;
}

/* ── Avertissements ─────────────────────────────────── */
function buildWarnings(redFlags){
  const w=[
    "• Ne teste pas plusieurs nouvelles recettes la même semaine — tu ne sauras pas ce qui fonctionne.",
    "• Test patch obligatoire avant chaque nouvelle préparation (intérieur du poignet, 24h).",
    "• Soin protéiné trop fréquent = cheveux durs, secs, cassants. Maximum 1 fois toutes les 3 à 4 semaines.",
    "• Chute naturelle (bulbe blanc visible) ≠ casse. 50 à 100 cheveux par jour tombent naturellement.",
    "• Chute soudaine, plaques, douleur, démangeaisons intenses persistantes : consulte un professionnel de santé — les soins capillaires seuls ne suffisent pas."
  ];
  if(state.heat!=="rare"&&state.heat!=="cool"&&state.heatProtectant!=="always") w.push("• Tu utilises la chaleur sans protection systématique. Les dommages thermiques sont cumulatifs et irréversibles — la protection thermique est non négociable.");
  if(["regular","severe"].includes(state.dandruff)) w.push("• Pellicules persistantes ou épaisses : un shampoing médicamenteux (kétoconazole, zinc pyrithione) peut être nécessaire — demande à un dermatologue.");
  return [...w,...redFlags.map(r=>`⚠️ ${r}`)].join("\n");
}

/* ── Bonus ──────────────────────────────────────────── */
function buildBonus(){
  const t=[];
  if(state.porosity==="low")    t.push("Ton secret : ouvre la cuticule avant chaque soin — vapeur, bonnet chaud, serviette tiède. Sans ça, même les meilleurs produits restent en surface.");
  if(state.porosity==="high")   t.push("Ton secret : referme la cuticule après chaque soin — eau froide, produits légèrement acidifiants. La rétention est ton combat quotidien.");
  if(state.elasticity==="low")  t.push("Priorité immédiate : ne te concentre pas sur la longueur avant d'avoir réglé l'élasticité. Des cheveux qui cassent ne retiennent pas de longueur.");
  if(["rough","sometimes_dry"].includes(state.detangling)) t.push("Ton levier n°1 : si tu ne changes qu'une seule chose cette semaine, change ta façon de démêler. Le résultat sera visible en 7 jours.");
  if(["low","poor"].includes(state.water)) t.push("Bois 6 à 8 verres d'eau par jour pendant 4 semaines. La différence sur la souplesse et l'éclat sera perceptible.");
  if(["high","chronic"].includes(state.stressSleep)) t.push("Le stress chronique augmente le cortisol, qui perturbe le cycle pilaire. Des cheveux sains ont aussi besoin d'une tête reposée — ce n'est pas un cliché, c'est de la biologie.");
  if(state.budget==="low") t.push("Budget limité : le yaourt, l'œuf, le miel, l'aloe vera et l'huile de coco couvrent 80% de tes besoins capillaires pour moins de 10€/mois. Les recettes maison sont souvent plus efficaces que les produits commerciaux coûteux.");
  return t.length ? t.join("\n\n") : "Commence simple, observe 4 semaines, puis ajuste. La patience et la régularité sont tes meilleures alliées.";
}

═══════════════════════════════════════════════════════════════════ */

  resetBtn.classList.add("visible");

      ${rec.conservation?`<br><small><strong>Conservation :</strong> ${rec.conservation}</small>`:""}

      ${rec.important ?`<br><small style="color:var(--gold)"><strong>⚠️ Important :</strong> ${rec.important}</small>`:""}

  const resultEl = document.createElement("div");
  resultEl.className = "msg result";
  resultEl.innerHTML = `
<div class="r-section">
  <div class="r-label">Score santé capillaire</div>
  <div class="score-badge">

    <div class="score-meta">Profil détecté<br><strong>${a.profile}</strong></div>
  </div>
</div>
<div class="divider"></div>
<div class="r-section">
  <div class="r-label">Résumé expert</div>
  <p>${a.summary}</p>
</div>
<div class="r-section">
  <div class="r-label">Causes profondes identifiées</div>
  <p style="white-space:pre-line">${a.causes}</p>
</div>
<div class="divider"></div>
<div class="r-section">
  <div class="r-label">Analyse professionnelle complète</div>
  <p style="white-space:pre-line">${a.coachReading}</p>
</div>
<div class="divider"></div>
<div class="r-section">
  <div class="r-label">Ta routine détaillée personnalisée</div>
  <p style="white-space:pre-line">${a.routine}</p>
</div>
<div class="divider"></div>
<div class="r-section">
  <div class="r-label">Recettes naturelles adaptées à ton profil</div>
  ${recipeCards}
</div>
<div class="divider"></div>
<div class="r-section">
  <div class="r-label">Plan d'action — 7 premiers jours</div>
  <p style="white-space:pre-line">${a.plan7}</p>
</div>
<div class="divider"></div>
<div class="r-section">
  <div class="r-label">Résultats réalistes à attendre</div>
  <p style="white-space:pre-line">${a.expectedResults}</p>
</div>
<div class="r-section">
  <div class="r-label">Précautions & signaux d'alarme</div>
  <p style="white-space:pre-line">${a.warnings}</p>
</div>
<div class="divider"></div>
<div class="r-section">
  <div class="r-label">Conseils clés pour toi</div>
  <p style="white-space:pre-line">${a.bonus}</p>
</div>`;

  removeTyping();
  chatBox.appendChild(resultEl);
  setTimeout(()=> resultEl.scrollIntoView({behavior:"smooth", block:"start"}), 80);

  /* -- Carte offre -- */
  const sets = getSettings();
  const offerEl = document.createElement("div");
  offerEl.className = "msg html-msg";
  offerEl.innerHTML = `<div class="offer-wrap">
    <h3>💛 Si tu veux aller plus loin avec moi</h3>

  setTimeout(()=>{

/* ═══════════════════════════════════════════════════════════════════
   EVENTS
═══════════════════════════════════════════════════════════════════ */
chatForm.addEventListener("submit", e=>{
  e.preventDefault();
  const v = userInput.value.trim();
  if(v) handleReply(v);
});

resetBtn.addEventListener("click", startChat);

/* Évite que le clavier mobile pousse le viewport et cache les boutons */
if(/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)){
  userInput.addEventListener("focus", ()=>{
    setTimeout(()=> chatBox.scrollTop = chatBox.scrollHeight, 350);
  });
}

startChat();
</script>
