<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diagnostic Capillaire Gratuit | Schicgirl</title>
  <meta name="author" content="Schicgirl">
  <meta property="og:title" content="Diagnostic Capillaire Schicgirl">
  <meta property="og:description" content="Découvre ce qui freine vraiment ta croissance et reçois une routine sur mesure.">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:    #fdf6ee;
      --warm:     #f5e9d8;
      --rose:     #e4b4af;
      --blush:    #f2d5cf;
      --brown:    #3e261c;
      --brown-md: #6b3e2e;
      --gold:     #b07b38;
      --gold-lt:  #d4a55e;
      --muted:    #9a7060;
      --white:    #ffffff;
      --shadow-s: 0 4px 24px rgba(62,38,28,.08);
      --shadow-m: 0 12px 48px rgba(62,38,28,.13);
      --shadow-l: 0 24px 80px rgba(62,38,28,.18);
      --radius:   20px;
      --radius-lg:28px;
      --serif: 'Cormorant Garamond', Georgia, serif;
      --sans:  'DM Sans', system-ui, sans-serif;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: var(--sans);
      color: var(--brown);
      background: var(--cream);
    }

    body {
      min-height: 100dvh;
      background:
        radial-gradient(ellipse 70% 55% at 8% 0%, #f2ccc7 0%, transparent 55%),
        radial-gradient(ellipse 60% 50% at 92% 100%, #edd9b0 0%, transparent 50%),
        radial-gradient(ellipse 80% 60% at 50% 50%, #fdf6ee 0%, transparent 100%);
    }

    /* ── Layout ─────────────────────────────────────── */
    .shell {
      width: min(1000px, 96vw);
      height: 100dvh;
      margin: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 10px 0;
    }

    /* ── Intro header ────────────────────────────────── */
    .intro {
      flex: 0 0 auto;
      background: rgba(255,255,255,.7);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(176,123,56,.2);
      border-radius: var(--radius-lg);
      padding: 14px 22px;
      text-align: center;
      box-shadow: var(--shadow-s);
    }

    .eyebrow {
      font-family: var(--sans);
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 4px;
    }

    .intro h1 {
      font-family: var(--serif);
      font-size: clamp(22px, 3.2vw, 38px);
      font-weight: 400;
      line-height: 1.08;
      color: var(--brown);
      margin-bottom: 6px;
    }

    .intro-sub {
      font-size: 12.5px;
      color: var(--muted);
      line-height: 1.5;
      max-width: 640px;
      margin: auto;
    }

    /* ── Chat panel ──────────────────────────────────── */
    .panel {
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
      background: rgba(255,255,255,.78);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(176,123,56,.18);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-l);
      overflow: hidden;
      position: relative;
    }

    /* Progress */
    .progress-track {
      height: 3px;
      background: rgba(176,123,56,.12);
      flex-shrink: 0;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--rose), var(--gold));
      transition: width .5s cubic-bezier(.4,0,.2,1);
    }

    /* Reset btn */
    #resetBtn {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 1px solid rgba(176,123,56,.25);
      background: rgba(255,255,255,.8);
      color: var(--muted);
      font-size: 15px;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      transition: all .2s;
      z-index: 10;
    }
    #resetBtn:hover { background: var(--warm); color: var(--brown); }
    #resetBtn.visible { display: flex; }

    /* Chat messages */
    .chat-box {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      padding: 20px 18px 12px;
      scroll-behavior: smooth;
    }

    .chat-box::-webkit-scrollbar { width: 4px; }
    .chat-box::-webkit-scrollbar-thumb { background: rgba(176,123,56,.25); border-radius: 4px; }

    .msg {
      max-width: 85%;
      margin-bottom: 10px;
      border-radius: 18px;
      padding: 11px 15px;
      font-size: 13.5px;
      line-height: 1.55;
      white-space: pre-line;
      animation: msgIn .28s cubic-bezier(.34,1.2,.64,1) both;
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px) scale(.97); }
      to   { opacity: 1; transform: none; }
    }

    .msg.bot {
      background: var(--white);
      border: 1px solid rgba(228,180,175,.45);
      border-bottom-left-radius: 6px;
      color: var(--brown);
    }

    .msg.user {
      background: var(--brown);
      color: var(--white);
      margin-left: auto;
      border-bottom-right-radius: 6px;
    }

    .msg.result {
      background: linear-gradient(145deg, #fffaf3, #fff8ee);
      border: 1px solid rgba(176,123,56,.3);
      max-width: 100%;
      font-size: 13px;
    }

    .msg.html-msg {
      background: transparent;
      border: none;
      padding: 0;
      max-width: 100%;
    }

    /* Typing indicator */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 11px 15px;
      background: var(--white);
      border: 1px solid rgba(228,180,175,.45);
      border-radius: 18px;
      border-bottom-left-radius: 6px;
      max-width: 68px;
      margin-bottom: 10px;
      animation: msgIn .28s both;
    }

    .typing-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--rose);
      animation: typingBounce 1.2s ease-in-out infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: .18s; }
    .typing-dot:nth-child(3) { animation-delay: .36s; }

    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: .6; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* Quick replies */
    .quick-replies {
      flex: 0 0 auto;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 16px 10px;
      max-height: 100px;
      overflow-y: auto;
    }

    .quick-btn {
      padding: 8px 14px;
      border-radius: 999px;
      border: 1.5px solid rgba(176,123,56,.35);
      background: rgba(255,255,255,.9);
      color: var(--brown-md);
      font-family: var(--sans);
      font-size: 12.5px;
      font-weight: 500;
      cursor: pointer;
      transition: all .18s;
      white-space: nowrap;
    }

    .quick-btn:hover {
      background: var(--warm);
      border-color: var(--gold);
      color: var(--brown);
    }

    /* Input form */
    .chat-form {
      flex: 0 0 auto;
      display: flex;
      gap: 8px;
      padding: 10px 14px 12px;
      border-top: 1px solid rgba(228,180,175,.35);
      background: rgba(253,246,238,.9);
    }

    .chat-form input {
      flex: 1;
      height: 44px;
      border-radius: 999px;
      border: 1.5px solid rgba(176,123,56,.28);
      padding: 0 18px;
      font-family: var(--sans);
      font-size: 16px;
      background: var(--white);
      color: var(--brown);
      outline: none;
      transition: border-color .18s;
    }

    .chat-form input:focus { border-color: var(--gold); }
    .chat-form input::placeholder { color: var(--muted); font-size: 13.5px; }

    .send-btn {
      height: 44px;
      padding: 0 20px;
      border-radius: 999px;
      border: none;
      background: var(--brown);
      color: var(--white);
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all .18s;
      white-space: nowrap;
    }

    .send-btn:hover { background: var(--brown-md); }

    /* ── Result card ─────────────────────────────────── */
    .result-section {
      margin-bottom: 16px;
    }

    .result-label {
      font-family: var(--sans);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 5px;
    }

    .result-section p, .result-section ul {
      font-size: 13px;
      line-height: 1.6;
      color: var(--brown);
    }

    .score-ring {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(176,123,56,.1);
      border-radius: 12px;
      padding: 8px 14px;
      margin-bottom: 12px;
    }

    .score-num {
      font-family: var(--serif);
      font-size: 36px;
      font-weight: 600;
      color: var(--gold);
      line-height: 1;
    }

    .score-label {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.3;
    }

    /* ── Offer card ──────────────────────────────────── */
    .offer-wrap {
      background: linear-gradient(145deg, #fffaf3, #fff5ea);
      border: 1px solid rgba(176,123,56,.35);
      border-radius: var(--radius);
      padding: 20px;
      margin-top: 4px;
    }

    .offer-wrap h3 {
      font-family: var(--serif);
      font-size: 22px;
      font-weight: 400;
      margin-bottom: 10px;
      color: var(--brown);
    }

    .offer-wrap p {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.65;
      margin-bottom: 10px;
    }

    .offer-btns {
      display: grid;
      gap: 10px;
      margin: 14px 0;
    }

    .offer-btn {
      display: block;
      text-align: center;
      text-decoration: none;
      padding: 13px 18px;
      border-radius: 999px;
      font-family: var(--sans);
      font-size: 13.5px;
      font-weight: 700;
      transition: all .2s;
    }

    .offer-btn.primary {
      background: var(--brown);
      color: var(--white);
    }

    .offer-btn.primary:hover { background: var(--brown-md); }

    .offer-btn.gold {
      background: linear-gradient(135deg, var(--gold), var(--gold-lt));
      color: var(--white);
    }

    .offer-btn.gold:hover { filter: brightness(1.05); }

    /* ── Used screen ─────────────────────────────────── */
    .used-screen {
      padding: 32px 24px;
      text-align: center;
    }

    .used-screen h2 {
      font-family: var(--serif);
      font-size: 30px;
      font-weight: 400;
      margin-bottom: 10px;
    }

    .used-screen p {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 8px;
    }

    .used-screen a {
      color: var(--gold);
      font-weight: 600;
      text-decoration: none;
    }

    /* ── Divider ─────────────────────────────────────── */
    .divider {
      height: 1px;
      background: rgba(176,123,56,.18);
      margin: 12px 0;
    }

    /* ── Responsive ──────────────────────────────────── */
    @media (max-width: 600px) {
      .shell { padding: 6px 0; gap: 7px; width: 100%; }
      .intro { padding: 10px 14px; border-radius: 14px; }
      .intro h1 { font-size: clamp(20px, 6.5vw, 28px); }
      .intro-sub { display: none; }
      .panel { border-radius: 14px; }
      .chat-box { padding: 14px 12px 8px; }
      .msg { font-size: 13px; max-width: 94%; }
      .chat-form { padding: 8px 10px 10px; }
    }

    @media (max-height: 680px) {
      .intro-sub { display: none; }
      .intro h1 { font-size: clamp(19px, 2.6vw, 26px); }
      .intro { padding: 8px 14px; }
    }
  </style>
</head>
<body>

<div class="shell">
  <header class="intro">
    <p class="eyebrow">Schicgirl™ — Diagnostic Capillaire</p>
    <h1>Découvre ce qui freine vraiment tes cheveux</h1>
    <p class="intro-sub">Réponds à quelques questions sincères et reçois un diagnostic personnalisé : ton profil capillaire, ton score santé, une routine détaillée et un plan d'action sur 7 jours.</p>
  </header>

  <main class="panel">
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <button id="resetBtn" title="Recommencer" aria-label="Recommencer">↻</button>
    <div class="chat-box" id="chatBox"></div>
    <div class="quick-replies" id="quickReplies"></div>
    <form class="chat-form" id="chatForm" autocomplete="off">
      <input id="userInput" placeholder="Écris ta réponse ici…" />
      <button type="submit" class="send-btn">Envoyer</button>
    </form>
  </main>
</div>

<script>
// ─── Config (remplace par ton config.js externe si besoin) ───────────────────
const CONFIG = {
  shopLink:          "https://selar.com/hydratation-cheveux-crepus",
  premiumLink:       "https://selar.com/70t3ur414k",
  customFinal:       "💛 Choisis l'offre qui correspond le mieux à ton besoin actuel.",
  webAppUrl:         "https://script.google.com/macros/s/AKfycbz3a2umYva-S2SH20gMDa2YuRPAt5suYBfS7qdrDgQBqXmv1EJ5dLfkhfC1Y3T622rI3g/exec",
  clientToken:       "schicchat_client_2026-12544455",
  leadStorageKey:    "schicchat_coach_leads",
  settingsStorageKey:"schicchat_coach_settings",
  enableOneUse:      true,
  usedStorageKey:    "schicchat_used_once"
};

// ─── DOM refs ────────────────────────────────────────────────────────────────
const chatBox     = document.getElementById("chatBox");
const quickR      = document.getElementById("quickReplies");
const chatForm    = document.getElementById("chatForm");
const userInput   = document.getElementById("userInput");
const resetBtn    = document.getElementById("resetBtn");
const progressFill= document.getElementById("progressFill");

// ─── State ───────────────────────────────────────────────────────────────────
const state = {
  step:"", name:"", contact:"", country:"", climate:"", mainProblem:"",
  texture:"", thickness:"", density:"", lastHydration:"", washFrequency:"",
  routine:"", breakage:"", porosity:"", scalp:"", styles:"", detangling:"",
  products:"", buildup:"", heat:"", water:"", foodProtein:"", stressSleep:"",
  goal:"", timeAvailable:"", score:0, profile:"", priority:"", offer:"",
  redFlags:[]
};

const STEPS = [
  "ask_name","ask_contact","ask_country","ask_climate","ask_problem",
  "ask_texture","ask_thickness","ask_density","ask_hydration","ask_wash",
  "ask_routine","ask_breakage","ask_porosity","ask_scalp","ask_styles",
  "ask_detangling","ask_products","ask_buildup","ask_heat","ask_water",
  "ask_food","ask_stress","ask_goal","ask_time","done"
];

// ─── Helpers ─────────────────────────────────────────────────────────────────
function norm(t){ return String(t||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").trim(); }
function getSettings(){
  const s = localStorage.getItem(CONFIG.settingsStorageKey);
  return s ? JSON.parse(s) : { shopLink:CONFIG.shopLink, premiumLink:CONFIG.premiumLink, customFinal:CONFIG.customFinal };
}
function oneUseEnabled(){ return CONFIG.enableOneUse===true; }
function hasUsed(){ return oneUseEnabled() && localStorage.getItem(CONFIG.usedStorageKey)==="true"; }
function markUsed(){ if(oneUseEnabled()) localStorage.setItem(CONFIG.usedStorageKey,"true"); }

function setStep(s){
  state.step = s;
  const i = STEPS.indexOf(s);
  progressFill.style.width = i<0 ? "0%" : `${Math.round((i/(STEPS.length-1))*100)}%`;
}

function setReplies(arr){
  quickR.innerHTML = "";
  (arr||[]).forEach(r=>{
    const b = document.createElement("button");
    b.className = "quick-btn";
    b.textContent = r.label;
    b.onclick = ()=>handleReply(r.value, r.label);
    quickR.appendChild(b);
  });
}

function resetState(){
  Object.keys(state).forEach(k=>{
    if(Array.isArray(state[k])) state[k]=[];
    else if(typeof state[k]==="number") state[k]=0;
    else state[k]="";
  });
  state.redFlags=[];
}

// ─── Typing indicator ────────────────────────────────────────────────────────
function showTyping(){
  const d = document.createElement("div");
  d.className = "typing-indicator";
  d.id = "typingDot";
  d.innerHTML = `<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>`;
  chatBox.appendChild(d);
  chatBox.scrollTop = chatBox.scrollHeight;
  return d;
}

function removeTyping(){
  const d = document.getElementById("typingDot");
  if(d) d.remove();
}

// ─── Add message ─────────────────────────────────────────────────────────────
function addMsg(text, sender="bot", isHtml=false, delay=0){
  return new Promise(res=>{
    setTimeout(()=>{
      removeTyping();
      const d = document.createElement("div");
      d.className = `msg ${sender}`;
      if(isHtml){ d.innerHTML=text; d.className="msg html-msg"; }
      else d.textContent = text;
      chatBox.appendChild(d);
      if(sender==="result"){
        d.className="msg result";
        setTimeout(()=>d.scrollIntoView({behavior:"smooth",block:"start"}),60);
      } else {
        chatBox.scrollTop = chatBox.scrollHeight;
      }
      res();
    }, delay);
  });
}

async function botSay(text, delay=520, isHtml=false){
  showTyping();
  await addMsg(text, "bot", isHtml, delay);
}

// ─── Start ───────────────────────────────────────────────────────────────────
function startChat(){
  if(hasUsed()){ showUsedScreen(); return; }
  chatForm.style.display = "flex";
  quickR.style.display = "flex";
  resetState();
  chatBox.innerHTML = "";
  setReplies([]);
  setStep("ask_name");
  resetBtn.classList.remove("visible");

  addMsg("💛 Bienvenue chez Schicgirl. Je suis SchicChat, ton coach capillaire virtuel.", "bot");
  setTimeout(()=>{
    botSay(
      "Je vais analyser tes cheveux de façon approfondie : hydratation, porosité, casse, cuir chevelu, climat, routine, alimentation et habitudes de vie.\n\nÀ la fin, tu recevras un diagnostic détaillé, une routine personnalisée étape par étape, et un plan d'action pour les 7 prochains jours.\n\nPremière question : comment souhaites-tu que je t'appelle ?",
      700
    );
  }, 200);
}

function showUsedScreen(){
  const s = getSettings();
  chatBox.innerHTML = "";
  setReplies([]);
  progressFill.style.width = "100%";
  chatForm.style.display = "none";
  quickR.style.display = "none";
  chatBox.innerHTML = `
    <div class="used-screen">
      <h2>Diagnostic déjà utilisé 💛</h2>
      <p>Tu as déjà bénéficié de ton diagnostic capillaire gratuit Schicgirl.</p>
      <p>Pour aller encore plus loin dans ta transformation, découvre nos offres spécialisées :</p>
      <p><a href="${s.shopLink}" target="_blank">💧 Guide Hydratation Cheveux Crépus</a></p>
      <p><a href="${s.premiumLink}" target="_blank">🌿 Diagnostic Capillaire Personnalisé (Premium)</a></p>
    </div>`;
}

// ─── Handle reply ─────────────────────────────────────────────────────────────
async function handleReply(value, label=value){
  const raw = String(value).trim();
  const inp = norm(raw);
  addMsg(label, "user");
  setReplies([]);
  userInput.value = "";

  switch(state.step){

    case "ask_name":
      state.name = raw;
      setStep("ask_contact");
      await botSay(`Ravie de te rencontrer, ${state.name} 💛\n\nSi tu le souhaites, tu peux me laisser ton adresse e-mail ou ton numéro WhatsApp afin de sauvegarder ton diagnostic. Tu peux aussi continuer sans partager tes coordonnées.`);
      setReplies([{label:"Continuer sans contact",value:"skip"}]);
      break;

    case "ask_contact":
      state.contact = inp==="skip" ? "" : raw;
      setStep("ask_country");
      await botSay("Dans quel pays vis-tu ? Cela me permettra d'adapter mes conseils au climat local et aux produits disponibles près de chez toi.");
      setReplies([
        {label:"France",value:"france"},
        {label:"Côte d'Ivoire",value:"cote_ivoire"},
        {label:"Canada",value:"canada"},
        {label:"États-Unis",value:"usa"},
        {label:"Autre",value:"autre"}
      ]);
      break;

    case "ask_country":
      state.country = raw;
      setStep("ask_climate");
      await botSay("Comment décririais-tu le climat où tu vis ?");
      setReplies([
        {label:"Chaud et sec",value:"hot_dry"},
        {label:"Chaud et humide / tropical",value:"humid"},
        {label:"Froid ou hivernal",value:"cold"},
        {label:"Variable selon les saisons",value:"variable"}
      ]);
      break;

    case "ask_climate":
      state.climate = inp;
      setStep("ask_problem");
      await botSay("Quelle est la chose qui te frustre le plus avec tes cheveux en ce moment ?");
      setReplies([
        {label:"Sécheresse persistante",value:"dryness"},
        {label:"Pousse qui n'avance pas",value:"growth"},
        {label:"Casse fréquente",value:"breakage"},
        {label:"Chute ou tempes clairsemées",value:"hairloss"},
        {label:"Je me sens perdue",value:"lost"}
      ]);
      break;

    case "ask_problem":
      state.mainProblem = inp;
      setStep("ask_texture");
      await botSay("Quelle est ta texture capillaire dominante ?");
      setReplies([
        {label:"4A — boucles serrées",value:"4a"},
        {label:"4B — zigzag prononcé",value:"4b"},
        {label:"4C — coils très serrés",value:"4c"},
        {label:"Texture mixte",value:"mixed_texture"},
        {label:"Je ne sais pas encore",value:"unknown"}
      ]);
      break;

    case "ask_texture":
      state.texture = inp;
      setStep("ask_thickness");
      await botSay("Si tu prends une seule mèche entre tes doigts, elle te semble :");
      setReplies([
        {label:"Fine, presque invisible",value:"fine"},
        {label:"Moyenne",value:"medium"},
        {label:"Épaisse et dense",value:"thick"},
        {label:"Je ne suis pas certaine",value:"unknown"}
      ]);
      break;

    case "ask_thickness":
      state.thickness = inp;
      setStep("ask_density");
      await botSay("Et la densité globale de ta chevelure — c'est-à-dire le nombre de cheveux sur ta tête — est plutôt :");
      setReplies([
        {label:"Faible — on voit facilement le cuir chevelu",value:"low_density"},

function saveLead(){
  const lead = {...state, date:new Date().toISOString()};
  const leads = JSON.parse(localStorage.getItem(CONFIG.leadStorageKey)||"[]");
  leads.push(lead);
  localStorage.setItem(CONFIG.leadStorageKey, JSON.stringify(leads));
  if(!CONFIG.webAppUrl || CONFIG.webAppUrl.includes("PASTE")) return;
  const p = new URLSearchParams();
  p.append("action","saveLead");
  p.append("token",CONFIG.clientToken);
  p.append("data",JSON.stringify(lead));
  fetch(CONFIG.webAppUrl,{method:"POST",body:p}).catch(()=>{});
}

function porosityNote(){

  if(state.porosity==="high_porosity")  return "Porosité élevée : hydrate puis scelle sans tarder pour retenir l'eau. Privilégie les leave-ins crémeux et les huiles légères en scellage.";

}

function routineHydration(){
  return `Objectif : réintroduire l'eau dans la fibre, la retenir et éviter que les cheveux redeviennent secs trop rapidement.

1. Sectionner les cheveux
Divise en 4 à 8 sections selon ta densité. L'objectif est de ne pas hydrater seulement la surface.

2. Pré-hydratation
Vaporise un mélange eau tiède + aloe vera (80/20). Les cheveux doivent être humides, pas détrempés. Presse doucement.

3. Leave-in ou crème hydratante
Applique une petite quantité par section, en partant des pointes vers les longueurs. Si les cheveux blanchissent, tu en mets trop.

4. Scellage
Une huile légère (jojoba, avocat, pépins de raisin) ou un beurre en fine couche sur les pointes. L'huile seule n'hydrate pas — elle retient l'eau déjà apportée.

5. Masque hydratant
Une fois par semaine ou toutes les deux semaines : masque hydratant, aloe vera, miel dilué ou yaourt au miel. Pose 20 à 30 minutes sous charlotte.

6. Protection nocturne
Bonnet ou taie d'oreiller en satin chaque nuit. Si les cheveux s'emmêlent vite, endors-toi avec 4 grosses vanilles.

${porosityNote()}`;
}

function routineGrowth(){

Leave-in + huile légère ou crème scellante sur les pointes. Coiffe en vanilles larges, tresses ou chignon souple.

Spray eau + leave-in deux fois par semaine minimum si les cheveux sèchent vite. Cible les longueurs, pas seulement les racines.

Masque hydratant si sécheresse, soin fortifiant doux si casse présente. Toujours terminer avec leave-in + scellage.

function routineBreakage(){

Eau ou leave-in + crème hydratante + huile légère, section par section, en insistant sur les zones fragiles.

Masque protéiné doux une fois toutes les 3 à 4 semaines. Toujours faire suivre d'une hydratation. Si les cheveux deviennent durs ou secs après : trop de protéines, attends plus longtemps.

Si elles sont fines, transparentes ou cassent en permanence : une micro-coupe s'impose. Pas besoin de couper beaucoup — juste de supprimer ce qui est trop fragilisé.

Vanilles larges, tresses amples, chignon bas. Évite les mèches trop lourdes et la manipulation quotidienne.

Satin obligatoire. Si les cheveux s'emmêlent la nuit, endors-toi avec de grosses vanilles.

function routineEdges(){

Eau + aloe vera ou leave-in très léger, en petite quantité avec les doigts, 2 à 3 fois par semaine.

Photo hebdomadaire. Observe sur 4 à 8 semaines — pas sur 2 jours.

Chute soudaine, plaques, douleur, démangeaisons intenses ou croûtes persistantes : ce ne sont plus des signaux à gérer seule.

  let score=10;
  const causes=[], redFlags=[];

  if(state.lastHydration==="week_plus"||state.lastHydration==="unknown"){ score-=2; causes.push("Hydratation trop espacée ou difficile à maintenir"); }
  if(state.washFrequency==="monthly"||state.washFrequency==="rare"){ score-=1; causes.push("Fréquence de lavage trop espacée, favorisant l'accumulation"); }
  if(state.routine==="unstable"||state.routine==="none"){ score-=2; causes.push("Routine capillaire irrégulière ou inexistante"); }
  if(state.breakage==="high"){ score-=2; causes.push("Casse importante lors de la manipulation"); }
  if(state.detangling==="often_dry"||state.detangling==="sometimes_dry"||state.detangling==="unsure"){ score-=1; causes.push("Démêlage trop sec, trop rapide ou mal maîtrisé"); }
  if(state.styles==="tight"){ score-=2; causes.push("Coiffures trop serrées générant une tension sur les tempes"); }
  if(state.scalp==="irritated"){ score-=1; causes.push("Cuir chevelu irrité ou sensible"); redFlags.push("Si les démangeaisons, plaques, douleurs ou chute intense persistent : consulte un dermatologue."); }
  if(state.products==="too_heavy"||state.products==="no_result"){ score-=1; causes.push("Produits probablement mal adaptés à ta porosité ou à ton épaisseur de mèche"); }
  if(state.buildup==="heavy"){ score-=1; causes.push("Accumulation de produits possible"); }
  if(state.heat==="often"){ score-=1; causes.push("Utilisation trop fréquente de la chaleur, accentuant sécheresse et fragilité"); }
  if(state.water==="low"){ score-=1; causes.push("Hydratation interne insuffisante"); }
  if(state.foodProtein==="rare"){ score-=1; causes.push("Apport en protéines alimentaires possiblement insuffisant"); }
  if(state.stressSleep==="high_stress"){ score-=1; causes.push("Stress élevé ou manque de sommeil impactant la santé capillaire"); }
  if(state.climate==="hot_dry"||state.climate==="cold"){ score-=1; causes.push("Climat qui accentue la tendance à la sécheresse"); }

  score = Math.max(1,score);

  let profile="Routine à stabiliser", offer="Routine Capillaire Personnalisée";
  let priority="stabiliser la routine, comprendre les besoins de tes cheveux et construire une base saine";
  let summary="Tes cheveux ont besoin d'une routine plus claire, plus régulière et plus simple. La priorité est de réduire la confusion et d'instaurer une base stable sur laquelle tout pourra se construire.";
  let routine=routineSimple();

  if(state.mainProblem==="dryness"||state.goal==="hydration"||state.lastHydration==="week_plus"){
    profile="Sécheresse chronique / hydratation irrégulière";
    offer="Guide Hydratation Cheveux Crépus";
    priority=state.porosity==="high_porosity"?"améliorer la rétention d'hydratation et sceller plus efficacement":"faire pénétrer l'hydratation sans surcharger la fibre";
    summary="Tes cheveux semblent manquer d'eau, de scellage et d'une fréquence d'hydratation adaptée. Le problème n'est pas forcément le manque de produits — c'est souvent la méthode et la régularité qui font défaut.";
    routine=routineHydration();
  }

  if(state.mainProblem==="growth"||state.goal==="length"){
    profile="Pousse bloquée par la casse";
    offer="Programme Pousse & Rétention";
    priority="réduire la casse et améliorer la rétention de longueur";
    summary="Tes cheveux poussent probablement, mais la longueur ne se voit pas parce que les pointes cassent, se dessèchent ou ne sont pas suffisamment protégées.";
    routine=routineGrowth();
  }

  if(state.mainProblem==="breakage"||state.breakage==="high"){
    profile="Casse silencieuse / fibre fragilisée";
    offer="Routine Anti-Casse";
    priority="réduire la casse, renforcer doucement la fibre et protéger les pointes";
    summary="Tes cheveux ont besoin de douceur avant tout : hydratation profonde, soin fortifiant léger et une meilleure protection au démêlage comme pendant la nuit.";
    routine=routineBreakage();
  }

  if(state.mainProblem==="hairloss"||state.goal==="edges"||state.styles==="tight"){
    profile="Tempes et cuir chevelu à préserver";
    offer="Programme Tempes & Repousse Douce";
    priority="réduire la tension, apaiser le cuir chevelu et protéger les zones fragiles";
    summary="Ta priorité absolue est de supprimer toutes les tensions, éviter les coiffures serrées et laisser les zones fragiles récupérer dans la douceur et la patience.";
    routine=routineEdges();
  }

  if(state.mainProblem==="lost"||state.goal==="simple_routine"){
    profile="Trop d'informations, besoin de clarté";
    offer="Diagnostic Capillaire Personnalisé";
    priority="construire une routine simple, réaliste et facile à maintenir dans la durée";
    summary="Tu as besoin d'un plan clair, avec peu de produits mais une vraie régularité. Trop d'informations peut paralyser plus qu'aider — commence simple, observe, ajuste.";
    routine=routineSimple();
  }

  const causesText = causes.length ? causes.map(c=>`• ${c}`).join("\n") : "• Aucun blocage majeur détecté — la régularité reste le facteur clé.";

  return {
    score, profile, priority, offer, summary,
    causes: causesText,
    coachReading: [porosityInsight(), climateNote(), textureNote(), buildupNote(), lifestyleNote()].filter(Boolean).join("\n\n"),
    routine, recipes:recipes(), plan7:plan7(profile),
    expectedResults:expectedResults(), improvSigns:improvSigns(),
    warnings:warnings(redFlags), bonus:bonus(), redFlags
  };
}
