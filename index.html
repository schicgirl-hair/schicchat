<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <title>Diagnostic Capillaire Gratuit | Schicgirl</title>
  <meta name="description" content="Diagnostic capillaire gratuit Schicgirl pour cheveux secs, cassants, pousse, tempes et routine." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="client-shell">
    <section class="client-intro">
      <p class="eyebrow">Schicgirl™ Diagnostic</p>
      <h1>Découvre ce qui bloque vraiment tes cheveux</h1>
      <p>
        Réponds à quelques questions et reçois un mini diagnostic avec ton profil,
        ton score capillaire, une routine simple et un plan starter 7 jours.
      </p>
    </section>

    <section class="chat-panel">
      <div id="progressWrap"><div id="progressBar"></div></div>
      <button id="resetBtn" class="hidden-reset" title="Recommencer" type="button">↻</button>
      <div id="chatBox" class="chat-box"></div>
      <div id="quickReplies" class="quick-replies"></div>

      <form id="chatForm" class="chat-form">
        <input id="userInput" autocomplete="off" placeholder="Écris ta réponse ici..." />
        <button type="submit">Envoyer</button>
      </form>
    </section>
  </main>

  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
